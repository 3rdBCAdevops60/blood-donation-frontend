name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # ✅ Install dependencies (INSIDE FRONTEND FOLDER)
      - name: Install dependencies
        run: npm install
        working-directory: ./blood-donation-ui

      # ✅ Run tests with coverage (INSIDE FRONTEND FOLDER)
      - name: Run tests with coverage
        run: npm test -- --coverage
        working-directory: ./blood-donation-ui

      # ✅ SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=varshinik27_blood-donation-frontend
            -Dsonar.organization=varshinik27
            -Dsonar.sources=./blood-donation-ui/src
            -Dsonar.javascript.lcov.reportPaths=blood-donation-ui/coverage/lcov.info
