name: SonarCloud Analysis

on:
  push:
    branches:
      - main

jobs:
  sonarcloud:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd blood-donation-ui
          npm install

      - name: Run tests with coverage
        run: |
          cd blood-donation-ui
          npm test -- --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=varshinik27_blood-donation-frontend
            -Dsonar.organization=varshinik27
            -Dsonar.sources=blood-donation-ui/src
            -Dsonar.javascript.lcov.reportPaths=blood-donation-ui/coverage/lcov.info
